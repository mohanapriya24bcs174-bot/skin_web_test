<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Medico Assistant - Smart Skin Health Detection</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Inter', 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
}

.card {
    background: white;
    border-radius: 20px;
    padding: 40px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    animation: slideUp 0.5s ease-out;
}

@keyframes slideUp {
    from {
        opacity: 0;
        transform: translateY(30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.card-header {
    text-align: center;
    margin-bottom: 35px;
}

.logo {
    font-size: 42px;
    margin-bottom: 15px;
}

.card-header h2 {
    font-size: 26px;
    font-weight: 700;
    color: #1f2937;
    margin-bottom: 8px;
}

.card-header p {
    font-size: 14px;
    color: #6b7280;
}

.form-group {
    margin-bottom: 18px;
}

.form-group label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: #374151;
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

input, select {
    width: 100%;
    padding: 12px 16px;
    border: 2px solid #e5e7eb;
    border-radius: 10px;
    font-size: 14px;
    transition: all 0.3s ease;
    font-family: inherit;
}

input:focus, select:focus {
    outline: none;
    border-color: #667eea;
    box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
}

input::placeholder {
    color: #9ca3af;
}

.form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
}

.submit-btn {
    width: 100%;
    padding: 14px;
    margin-top: 10px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-size: 15px;
    font-weight: 600;
    transition: all 0.3s ease;
    box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
}

.submit-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
}

.submit-btn:active {
    transform: translateY(0);
}

.hidden {
    display: none !important;
}

.message {
    margin-top: 20px;
    padding: 14px;
    border-radius: 10px;
    text-align: center;
    font-weight: 500;
}

.success {
    background: #d1fae5;
    color: #065f46;
    animation: slideUp 0.3s ease-out;
}

.error {
    background: #fee2e2;
    color: #991b1b;
}

/* OTP Popup Modal */
.modal {
    display: none;
    position: fixed;
    z-index: 1000;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0, 0, 0, 0.5);
    animation: fadeIn 0.3s ease-out;
}

@keyframes fadeIn {
    from {
        opacity: 0;
    }
    to {
        opacity: 1;
    }
}

.modal.show {
    display: flex;
    justify-content: center;
    align-items: center;
}

.modal-content {
    background: white;
    border-radius: 20px;
    padding: 40px;
    max-width: 400px;
    width: 90%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    text-align: center;
    animation: modalSlideUp 0.4s ease-out;
}

@keyframes modalSlideUp {
    from {
        opacity: 0;
        transform: scale(0.9);
    }
    to {
        opacity: 1;
        transform: scale(1);
    }
}

.modal-header {
    margin-bottom: 25px;
}

.modal-header h3 {
    font-size: 24px;
    font-weight: 700;
    color: #1f2937;
    margin-bottom: 8px;
}

.modal-header p {
    font-size: 14px;
    color: #6b7280;
}

.otp-input-group {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin: 25px 0;
}

.otp-input {
    width: 50px;
    height: 50px;
    font-size: 24px;
    text-align: center;
    border: 2px solid #e5e7eb;
    border-radius: 10px;
    transition: all 0.3s ease;
}

.otp-input:focus {
    outline: none;
    border-color: #667eea;
    box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
}

.close-modal {
    margin-top: 15px;
    color: #6b7280;
    cursor: pointer;
    font-size: 14px;
    transition: color 0.3s ease;
}

.close-modal:hover {
    color: #667eea;
}

@media (max-width: 768px) {
    .form-row {
        grid-template-columns: 1fr;
    }
}
</style>
</head>

<body>

<div class="card">
    <div class="card-header">
        <div class="logo">🏥</div>
        <h2>Medico Assistant</h2>
        <p>Your Personal Skin Health Expert</p>
    </div>

    <form id="registrationForm">
        <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="name" placeholder="John Doe" required>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>Age</label>
                <input type="number" id="age" placeholder="25" min="1" max="120" required>
            </div>
            <div class="form-group">
                <label>Gender</label>
                <select id="gender" required>
                    <option value="">Select Gender</option>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                    <option value="Other">Other</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label>Phone Number</label>
            <input type="tel" id="phone" placeholder="+1 (555) 000-0000" required>
        </div>

        <button type="button" class="submit-btn" onclick="sendOTP()">Send OTP</button>
    </form>

    <div id="message"></div>
</div>

<!-- OTP Modal Popup -->
<div id="otpModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3>Verify OTP</h3>
            <p>Enter the 4-digit code sent to your phone</p>
        </div>

        <div style="background: #f0f4ff; border: 2px solid #667eea; border-radius: 12px; padding: 16px; margin: 20px 0; text-align: center;">
            <div style="font-size: 12px; color: #6b7280; margin-bottom: 8px;">Your OTP Code:</div>
            <div id="otpDisplay" style="font-size: 32px; font-weight: 700; color: #667eea; letter-spacing: 8px;">0000</div>
        </div>

        <div class="otp-input-group">
            <input type="text" class="otp-input" maxlength="1" onkeyup="moveToNext(this)" id="otp1">
            <input type="text" class="otp-input" maxlength="1" onkeyup="moveToNext(this)" id="otp2">
            <input type="text" class="otp-input" maxlength="1" onkeyup="moveToNext(this)" id="otp3">
            <input type="text" class="otp-input" maxlength="1" onkeyup="moveToNext(this)" id="otp4">
        </div>

        <button type="button" class="submit-btn" onclick="verifyOTP()">Verify & Continue</button>
        <div class="close-modal" onclick="closeModal()">← Back</div>
    </div>
</div>

<script>
let generatedOTP = "";

function sendOTP() {
    let name = document.getElementById("name").value.trim();
    let age = document.getElementById("age").value.trim();
    let gender = document.getElementById("gender").value.trim();
    let phone = document.getElementById("phone").value.trim();

    if (!name || !age || !gender || !phone) {
        showMessage("Please fill all fields", "error");
        return;
    }

    if (phone.replace(/\D/g, '').length < 10) {
        showMessage("Enter a valid phone number", "error");
        return;
    }

    generatedOTP = String(Math.floor(1000 + Math.random() * 9000));
    
    // Display OTP in modal
    document.getElementById("otpDisplay").textContent = generatedOTP;
    
    // Show modal
    document.getElementById("otpModal").classList.add("show");
    document.getElementById("otp1").focus();

    // For demo: show OTP in console
    console.log("OTP for demo: " + generatedOTP);
}

function moveToNext(current) {
    if (current.value.length >= 1) {
        let nextInput = current.nextElementSibling;
        if (nextInput) nextInput.focus();
    }
}

function verifyOTP() {
    let otp = document.getElementById("otp1").value + 
              document.getElementById("otp2").value + 
              document.getElementById("otp3").value + 
              document.getElementById("otp4").value;

    if (!otp || otp.length !== 4) {
        alert("Please enter all 4 digits");
        return;
    }

    if (otp === generatedOTP) {
        localStorage.setItem("username", document.getElementById("name").value);
        document.getElementById("otpModal").classList.remove("show");
        showMessage("✅ Verified Successfully! Redirecting...", "success");
        setTimeout(() => {
            window.location.href = "/terms";
        }, 1500);
    } else {
        alert("Invalid OTP. Please try again.");
        clearOTP();
        document.getElementById("otp1").focus();
    }
}

function closeModal() {
    document.getElementById("otpModal").classList.remove("show");
    document.getElementById("otpDisplay").textContent = "0000";
    clearOTP();
}

function clearOTP() {
    document.getElementById("otp1").value = "";
    document.getElementById("otp2").value = "";
    document.getElementById("otp3").value = "";
    document.getElementById("otp4").value = "";
}

function showMessage(text, type) {
    let messageDiv = document.getElementById("message");
    messageDiv.innerHTML = `<div class="message ${type}">${text}</div>`;
}

// Close modal when clicking outside
window.onclick = function(event) {
    let modal = document.getElementById("otpModal");
    if (event.target === modal) {
        closeModal();
    }
}
</script>

</body>
</html>
